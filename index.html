<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d18">
<title>CRM · Sei Tu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d18;--s1:#13131f;--s2:#1a1a2e;--s3:#22223a;--border:#2d2d4a;--cyan:#22d3ee;--orange:#fb923c;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--purple:#a78bfa;--text:#f0f4ff;--muted:#6b7280;--r:12px;--rsm:8px;--rc:14px}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;line-height:1.4}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.sc{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.sc.on{display:flex}
.scr{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.scr::-webkit-scrollbar{display:none}
/* TOPBAR */
.tb{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;min-height:54px}
.tb-t{font-size:16px;font-weight:700;flex:1}
.tb-s{font-size:11px;color:var(--muted)}
.tb-bk{background:none;border:none;color:var(--cyan);font-size:22px;cursor:pointer;padding:4px 8px 4px 0;line-height:1}
/* BOTTOM NAV */
#vNav{display:flex;background:var(--s1);border-top:1px solid var(--border);flex-shrink:0}
.vb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 12px;border:none;background:none;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.3px}
.vb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.vb.on{color:var(--cyan)}
/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rc);padding:14px;margin-bottom:10px}
.ct{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.cc{background:var(--s1);border:1px solid var(--border);border-radius:var(--rc);padding:13px;margin-bottom:9px}
/* BUTTONS */
.btn{display:block;width:100%;padding:14px;background:var(--cyan);color:#000;font-weight:800;font-size:15px;border:none;border-radius:var(--r);cursor:pointer;margin-top:8px;letter-spacing:.3px}
.btn.sec{background:var(--s3);color:var(--text);border:1px solid var(--border)}
.btn.red{background:var(--red);color:#fff}
.btn.or{background:var(--orange);color:#000}
.sm{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;border-radius:20px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.sm.g{background:rgba(74,222,128,.12);border-color:var(--green);color:var(--green)}
.sm.wa{background:rgba(37,211,102,.12);border-color:#25D366;color:#25D366}
.sm.cy{background:rgba(34,211,238,.15);border-color:var(--cyan);color:var(--cyan)}
.sm.rd{color:var(--red)}
.fab{position:fixed;bottom:80px;right:16px;width:56px;height:56px;border-radius:50%;background:var(--cyan);border:none;color:#000;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(34,211,238,.4);z-index:100;line-height:1}
/* FORMS */
.fi{display:block;width:100%;padding:12px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--cyan)}
.fta{min-height:80px;resize:vertical}
.fl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.fg{margin-bottom:14px}
/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.ch{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--s2);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.ch.on{background:rgba(34,211,238,.15);border-color:var(--cyan);color:var(--cyan)}
.ch.gon{background:rgba(74,222,128,.15);border-color:var(--green);color:var(--green)}
.ch.ron{background:rgba(248,113,113,.15);border-color:var(--red);color:var(--red)}
.ch.oon{background:rgba(251,146,60,.15);border-color:var(--orange);color:var(--orange)}
/* WIZARD */
.wp{height:3px;background:var(--s3);flex-shrink:0}
.wf{height:100%;background:var(--cyan);transition:width .3s}
/* TAGS */
.tg{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700}
.tg.c{background:rgba(34,211,238,.12);color:var(--cyan)}
.tg.g{background:rgba(74,222,128,.12);color:var(--green)}
.tg.o{background:rgba(251,146,60,.12);color:var(--orange)}
.tg.r{background:rgba(248,113,113,.12);color:var(--red)}
.tg.m{background:var(--s3);color:var(--muted)}
/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sb{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:12px}
.sn{font-size:28px;font-weight:900;line-height:1}
.sl2{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.bc{display:flex;flex-direction:column;gap:8px}
.br{display:flex;align-items:center;gap:8px;font-size:12px}
.bl{width:110px;flex-shrink:0;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bt{flex:1;height:8px;background:var(--s3);border-radius:4px;overflow:hidden}
.bf{height:100%;border-radius:4px}
.bv{width:28px;text-align:right;color:var(--muted);flex-shrink:0}
/* MISC */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
#modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);align-items:flex-end}
#modal.on{display:flex}
.mb{background:var(--s1);border-radius:var(--rc) var(--rc) 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto}
.mt{font-size:18px;font-weight:800;margin-bottom:14px}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--s3);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.on{opacity:1}
.div{height:1px;background:var(--border);margin:12px 0}
.filts{display:flex;gap:6px;overflow-x:auto;padding:10px 14px;flex-shrink:0}
.filts::-webkit-scrollbar{display:none}
.fb{padding:7px 14px;border-radius:20px;background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.fb.on{background:rgba(34,211,238,.15);border-color:var(--cyan);color:var(--cyan)}
.srch{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:8px 14px;margin:0 14px 10px}
.srch input{background:none;border:none;outline:none;color:var(--text);font-size:14px;flex:1;font-family:inherit}
.srch svg{width:15px;height:15px;stroke:var(--muted);fill:none;flex-shrink:0}
.vh{background:var(--s2);border-radius:var(--rsm);padding:11px;margin-bottom:8px}
.vhd{font-size:10px;color:var(--cyan);font-weight:700;margin-bottom:4px}
.vhr{font-size:13px;font-weight:700;margin-bottom:2px}
.vhx{font-size:12px;color:var(--muted)}
.ph{display:flex;align-items:center;gap:10px;background:var(--s2);border-radius:var(--rsm);padding:12px;cursor:pointer;margin-bottom:8px}
.pb{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px dashed var(--border);border-radius:var(--rsm);padding:12px;cursor:pointer;margin-top:8px}
.pb span{font-size:13px;font-weight:600;color:var(--cyan)}
.pp{width:100%;border-radius:var(--rsm);margin-top:8px;display:none}
/* LOGIN */
#sLogin{background:var(--bg);justify-content:center;align-items:center}
.lb{width:100%;max-width:360px;padding:28px 24px}
.ll{font-size:32px;font-weight:900;color:var(--cyan);letter-spacing:-1px;margin-bottom:4px}
.ls{font-size:13px;color:var(--muted);margin-bottom:32px}
/* TOGGLE */
.sw{position:relative;display:inline-block;width:44px;height:26px}
.sw input{opacity:0;width:0;height:0}
.sl3{position:absolute;cursor:pointer;inset:0;background:var(--s3);border-radius:13px;transition:.3s}
.sl3:before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.sl3{background:var(--cyan)}
input:checked+.sl3:before{transform:translateX(18px)}
.sr{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
/* GERENTE SIDE */
#gSide{display:none;width:200px;background:var(--s1);border-right:1px solid var(--border);flex-direction:column;flex-shrink:0;padding:16px 0}
.glo{padding:8px 18px 20px;font-size:17px;font-weight:900;color:var(--cyan)}
.gb{display:flex;align-items:center;gap:10px;padding:11px 18px;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;width:100%;text-align:left}
.gb svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.gb.on{color:var(--cyan);background:rgba(34,211,238,.08)}
@media(min-width:768px){
  #gSide{display:flex}
  #sGerente{flex-direction:row}
  .sg{grid-template-columns:1fr 1fr 1fr 1fr}
  #gCont{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
}
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div class="sc on" id="sLogin">
  <div class="lb">
    <div class="ll">Sei Tu</div>
    <div class="ls">CRM Comercial</div>
    <div class="fg"><label class="fl">Usuario</label><input class="fi" id="lU" type="text" autocomplete="username" autocorrect="off" autocapitalize="none"></div>
    <div class="fg"><label class="fl">Contrasena</label><input class="fi" id="lP" type="password" autocomplete="current-password"></div>
    <div id="lErr" style="color:var(--red);font-size:13px;margin-bottom:10px;display:none"></div>
    <button class="btn" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<!-- VENDEDOR -->
<div class="sc" id="sVen">
  <!-- HOY -->
  <div class="sc on" id="sVH">
    <div class="tb">
      <div style="flex:1"><div class="tb-t" id="vNm">Hola!</div><div class="tb-s" id="vDt"></div></div>
      <button class="sm" onclick="sincBajar(function(ok){if(ok){renderVH();toast('Actualizado','ok');}})">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Sync
      </button>
    </div>
    <div class="scr" id="vHB"></div>
    <button class="fab" onclick="nuevoPros()" title="Nuevo prospecto">+</button>
  </div>
  <!-- PIPELINE -->
  <div class="sc" id="sVP">
    <div class="tb"><div class="tb-t">Pipeline</div></div>
    <div class="filts" id="vPF"></div>
    <div class="scr" id="vPB"></div>
  </div>
  <!-- GIRA -->
  <div class="sc" id="sVG">
    <div class="tb">
      <div class="tb-t">Gira del dia</div>
      <button class="sm wa" onclick="expGiraWA()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>WA
      </button>
    </div>
    <div class="scr">
      <div id="vGL"></div>
      <div style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">AGREGAR</div>
        <div class="srch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="gSrch" placeholder="Buscar..." oninput="renderGA()"></div>
        <div id="vGA"></div>
      </div>
    </div>
  </div>
</div>

<!-- WIZARD -->
<div class="sc" id="sWiz">
  <div class="tb">
    <button class="tb-bk" onclick="wBack()">&#8592;</button>
    <div style="flex:1"><div class="tb-t" id="wT"></div><div class="tb-s" id="wS"></div></div>
    <div style="font-size:12px;color:var(--muted);font-weight:700" id="wL"></div>
  </div>
  <div class="wp"><div class="wf" id="wP"></div></div>
  <div class="scr" id="wB"></div>
  <div style="padding:10px 14px 14px;flex-shrink:0;display:flex;gap:8px">
    <button class="btn sec" id="wBk" onclick="wPrev()" style="flex:1;display:none">Volver</button>
    <button class="btn or" id="wNx" onclick="wNext()" style="flex:1">Siguiente</button>
  </div>
</div>

<!-- GERENTE -->
<div class="sc" id="sGerente">
  <div id="gSide">
    <div class="glo">Sei Tu CRM</div>
    <button class="gb on" id="gbD" onclick="gGo('D')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</button>
    <button class="gb" id="gbC" onclick="gGo('C')"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Contactos</button>
    <button class="gb" id="gbE" onclick="gGo('E')"><svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>Embudo</button>
    <button class="gb" id="gbV" onclick="gGo('V')"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Visitas</button>
    <button class="gb" id="gbCo" onclick="gGo('Co')"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>Comodatos</button>
    <button class="gb" id="gbCfg" onclick="gGo('Cfg')" style="margin-top:auto"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Config</button>
    <button class="gb" onclick="doLogout()" style="color:var(--red)"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Salir</button>
  </div>
  <div id="gCont">
    <div class="sc on" id="sGD"><div class="scr" id="gDB"></div></div>
    <div class="sc" id="sGC">
      <div class="filts" id="gCF"></div>
      <div class="srch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="gCS" placeholder="Buscar..." oninput="renderGC()"></div>
      <div class="scr" id="gCB"></div>
    </div>
    <div class="sc" id="sGE"><div class="filts" id="gEF"></div><div class="scr" id="gEB"></div></div>
    <div class="sc" id="sGV"><div class="filts" id="gVF"></div><div class="scr" id="gVB"></div></div>
    <div class="sc" id="sGCo">
      <div class="tb"><div class="tb-t">Comodatos</div><button class="sm g" onclick="nuevoComodato()" style="margin-left:auto">+ Nuevo</button></div>
      <div class="filts" id="gCoF"></div>
      <div class="scr" id="gCoB"></div>
    </div>
    <div class="sc" id="sGCfg"><div class="scr" id="gCfgB"></div></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="mb">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="mt" id="mT"></div>
      <button style="background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1" onclick="cMod()">&#215;</button>
    </div>
    <div id="mB"></div>
  </div>
</div>
<div id="toast"></div>

<!-- BOTTOM NAV -->
<div id="vNav" style="display:none">
  <button class="vb on" id="vbH" onclick="vGo('H')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>HOY</button>
  <button class="vb" id="vbP" onclick="vGo('P')"><svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>PIPELINE</button>
  <button class="vb" id="vbG" onclick="vGo('G')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>GIRA</button>
</div>

<script>
var ET=['Nuevo Prospecto','Contactado','Propuesta Enviada','Negociacion','Freezer Instalado','Cliente Activo'];
var SA=['No Le Interesa','Perdido'];
var EC={'Nuevo Prospecto':'#fb923c','Contactado':'#fbbf24','Propuesta Enviada':'#a78bfa','Negociacion':'#22d3ee','Freezer Instalado':'#4ade80','Cliente Activo':'#4ade80','No Le Interesa':'#f87171','Perdido':'#f87171'};
var MD={'Nuevo Prospecto':'Hola! Soy de Sei Tu Helados, pase por tu local y me gustaria contarte nuestra propuesta. Tenes un minuto?','Contactado':'Hola! Te escribo para coordinar una visita y mostrarte la propuesta de Sei Tu. Que dia te viene bien?','Propuesta Enviada':'Hola! Pudiste ver la propuesta? Queda alguna duda que pueda responder?','Negociacion':'Hola! Como venimos con la propuesta? Si necesitas ajustar algo avisame.','Freezer Instalado':'Hola! Ya tenes el freezer instalado. Cualquier cosa para arrancar, contame!','Cliente Activo':'Hola! Como va la venta? Aviso si hay novedades o promos.','No Le Interesa':'Gracias por tu tiempo! Si cambia la situacion quedo disponible.','Perdido':'Hola! Hace tiempo no hablamos. Segui interesado en Sei Tu?'};
var CFG={syncUrl:'',barrios:['Nueva Cordoba','Cofico','Alta Cordoba','Alberdi','General Paz','Cerro de las Rosas','Urca','Villa Belgrano','Centro','Otro'],tipos:['Drugstore/Kiosco','Mini Super','Club','Restaurante','Cafeteria','Heladeria','Farmacia','Otros'],marcas:['Frare','Bambi','Ugarte','Propio','Otro'],razones:['Sin plata','Freezer lleno','Freezer roto','Sin tiempo','Otro'],msgs:Object.assign({},MD)};
var D={user:null,usrs:[{id:1,n:'Jorge',u:'jorge',p:'seitu2026',r:'gerente'},{id:2,n:'Chamu',u:'chamu',p:'seitu2026',r:'vendedor'},{id:3,n:'Pablo',u:'pablo',p:'seitu2026',r:'vendedor'}],cli:[],vis:[],com:[],gira:[],cfg:JSON.parse(JSON.stringify(CFG))};
// UTILS
function uid(){return Date.now()+Math.random().toString(36).slice(2,5);}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lg(k,d){try{var v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch(e){return d;}}
function fmt(d){if(!d||d==='')return '--';try{var p=String(d).split('-');if(p.length!==3)return d;return parseInt(p[2])+'/'+parseInt(p[1])+'/'+p[0].slice(2);}catch(e){return d;}}
function dias(d){if(!d)return null;return Math.floor((Date.now()-new Date(d+'T12:00:00'))/86400000);}
function es(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function h2r(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16);}
function toast(m,t){var el=document.getElementById('toast');el.textContent=m;el.className='on';el.style.background=t==='err'?'rgba(248,113,113,.2)':t==='ok'?'rgba(74,222,128,.2)':'rgba(34,211,238,.15)';el.style.color=t==='err'?'var(--red)':t==='ok'?'var(--green)':'var(--cyan)';setTimeout(function(){el.className='';},2500);}
function save(){ls('jc',D.cli);ls('jv',D.vis);ls('jo',D.com);ls('jg',D.gira);ls('jf',D.cfg);ls('ju',D.usrs);}
function load(){
  var c=lg('jc',null);if(c)D.cli=c;
  var v=lg('jv',null);if(v)D.vis=v;
  var o=lg('jo',null);if(o)D.com=o;
  var g=lg('jg',null);if(g)D.gira=g;
  var f=lg('jf',null);if(f){Object.keys(CFG).forEach(function(k){if(f[k]===undefined)f[k]=CFG[k];});D.cfg=f;}
  var u=lg('ju',null);if(u)D.usrs=u;
  D.cli.forEach(function(c){if(!c.etapaEmbudo||c.etapaEmbudo==='')c.etapaEmbudo=c.esP?'Nuevo Prospecto':'Cliente Activo';if(!c.uv)c.uv='';if(!c.ex)c.ex={};if(c.deu===undefined)c.deu=false;});
}
function cFoto(file,cb){var r=new FileReader();r.onload=function(){var i=new Image();i.onload=function(){var cv=document.createElement('canvas');var mx=900;var rt=Math.min(mx/i.width,mx/i.height,1);cv.width=Math.round(i.width*rt);cv.height=Math.round(i.height*rt);cv.getContext('2d').drawImage(i,0,0,cv.width,cv.height);cb(cv.toDataURL('image/jpeg',.72));};i.src=r.result;};r.readAsDataURL(file);}
// CHIPS
function ch(id,lbl,grp,multi,cls){return '<span class="ch'+(cls?' '+cls:'')+'" data-id="'+es(id)+'" data-g="'+grp+'" onclick="tc(this,'+(multi?'true':'false')+')" style="cursor:pointer">'+es(lbl)+'</span>';}
function tc(el,m){if(!m){document.querySelectorAll('[data-g="'+el.getAttribute('data-g')+'"]').forEach(function(e){e.classList.remove('on');});}el.classList.toggle('on');}
function gc(g){var e=document.querySelector('[data-g="'+g+'"].on');return e?e.getAttribute('data-id'):'';}
function gcs(g){var r=[];document.querySelectorAll('[data-g="'+g+'"].on').forEach(function(e){r.push(e.getAttribute('data-id'));});return r;}
function sc(g,v){document.querySelectorAll('[data-g="'+g+'"]').forEach(function(e){e.classList.toggle('on',e.getAttribute('data-id')===v);});}
// SYNC
function getUrl(){return D.cfg.syncUrl||'';}
function sincBajar(cb){
  var url=getUrl();if(!url){if(cb)cb(false);return;}
  toast('Descargando...','info');
  var fn='_cb'+Date.now();var s=null;
  var tm=setTimeout(function(){delete window[fn];if(s&&s.parentNode)s.parentNode.removeChild(s);toast('Sin respuesta del servidor','err');if(cb)cb(false);},20000);
  window[fn]=function(res){
    clearTimeout(tm);delete window[fn];if(s&&s.parentNode)s.parentNode.removeChild(s);
    if(!res||!res.ok){toast('Error del servidor','err');if(cb)cb(false);return;}
    var d=res.data||{};
    if(d.clientes&&d.clientes.length)D.cli=d.clientes;
    if(d.visitas)D.vis=d.visitas;
    if(d.comodatos)D.com=d.comodatos;
    if(d.config){['barrios','tipos','marcas','razones','msgs'].forEach(function(k){if(d.config[k]!==undefined)D.cfg[k]=d.config[k];});}
    if(d.usrs&&d.usrs.length)D.usrs=d.usrs;
    save();toast('Datos actualizados','ok');if(cb)cb(true);
  };
  s=document.createElement('script');s.src=url+'?accion=cargar_todo&callback='+fn;
  s.onerror=function(){clearTimeout(tm);delete window[fn];if(s.parentNode)s.parentNode.removeChild(s);toast('Sin conexion','err');if(cb)cb(false);};
  document.head.appendChild(s);
}
function sincSubir(cb){
  var url=getUrl();if(!url){if(cb)cb(false);return;}
  toast('Guardando...','info');
  fetch(url,{method:'POST',body:JSON.stringify({accion:'guardar_todo',clientes:D.cli,visitas:D.vis,comodatos:D.com,config:D.cfg,usrs:D.usrs}),mode:'no-cors'})
    .then(function(){toast('Guardado en la nube','ok');if(cb)cb(true);})
    .catch(function(){toast('Sin conexion','err');if(cb)cb(false);});
}
// AUTH
function doLogin(){
  var u=document.getElementById('lU').value.trim();
  var p=document.getElementById('lP').value.trim();
  var e=document.getElementById('lErr');e.style.display='none';
  if(!u||!p){e.textContent='Ingresa usuario y contrasena.';e.style.display='block';return;}
  var usr=null;for(var i=0;i<D.usrs.length;i++){if(D.usrs[i].u===u&&D.usrs[i].p===p){usr=D.usrs[i];break;}}
  if(!usr){e.textContent='Usuario o contrasena incorrectos.';e.style.display='block';return;}
  D.user=usr;ls('jses',usr);
  sincBajar(function(){startApp();});
}
function startApp(){
  document.getElementById('sLogin').classList.remove('on');
  if(D.user.r==='gerente'||D.user.r==='admin'){
    document.getElementById('sGerente').classList.add('on');
    document.getElementById('vNav').style.display='none';
    renderGD();
  } else {
    document.getElementById('sVen').classList.add('on');
    document.getElementById('vNav').style.display='flex';
    document.getElementById('vNm').textContent='Hola, '+D.user.n+'!';
    document.getElementById('vDt').textContent=new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
    renderVH();
  }
}
function doLogout(){
  sincSubir(function(){
    D.user=null;ls('jses',null);
    document.querySelectorAll('.sc').forEach(function(s){s.classList.remove('on');});
    document.getElementById('sLogin').classList.add('on');
    document.getElementById('vNav').style.display='none';
    document.getElementById('lU').value='';document.getElementById('lP').value='';
  });
}

var W={steps:[],cur:0,data:{},cid:null,tipo:null,nu:false};

function wRender(){
  var s=W.steps[W.cur];var n=W.steps.length;
  document.getElementById('wS').textContent=s.sub||'';
  document.getElementById('wL').textContent=(W.cur+1)+'/'+n;
  document.getElementById('wP').style.width=(((W.cur+1)/n)*100)+'%';
  document.getElementById('wB').innerHTML=s.render(W.data,W.cid);
  document.getElementById('wBk').style.display=W.cur>0?'block':'none';
  var ul=W.cur===n-1;
  document.getElementById('wNx').textContent=ul?'Guardar':'Siguiente';

  h+='</div>';
  if(c.comp){h+='<div class="fl">Competencia</div><div style="font-size:13px;margin-bottom:10px">'+es(c.comp)+'</div>';}
  if(c.obs){h+='<div class="fl">Observaciones</div><div style="font-size:13px;color:var(--muted);margin-bottom:10px">'+es(c.obs)+'</div>';}
  h+='<div class="div"></div><div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px">HISTORIAL DE VISITAS ('+vs.length+')</div>';
  if(!vs.length){h+='<div style="color:var(--muted);font-size:13px">Sin visitas registradas</div>';}
  vs.forEach(function(v){
    h+='<div class="vh"><div class="vhd">'+fmt(v.fecha)+(v.vend?' · '+es(v.vend):'')+'</div>';
    if(v.tipo==='cliente'){
      h+='<div class="vhr">'+(v.vendio===true?'Venta realizada':v.vendio===false?'Sin venta':'Sin dato de venta')+'</div>';
      if(v.vendio===false&&v.razones)h+='<div class="vhx">'+es(Array.isArray(v.razones)?v.razones.join(', '):v.razones)+'</div>';
      if(v.iE)h+='<div class="vhx">Ext: '+es(v.iE)+'</div>';
      if(v.frfX&&v.frfX!=='OK')h+='<div class="vhx" style="color:var(--orange)">Freezer ext: '+es(v.frfX)+'</div>';
      if(v.pop)h+='<div class="vhx">POP: '+es(v.pop)+'</div>';
    } else {
      h+='<div class="vhr">Visita a prospecto</div>';
      if(v.eta)h+='<div class="vhx">Etapa: '+es(v.eta)+'</div>';
    }
    if(v.nt)h+='<div class="vhx" style="margin-top:3px;font-style:italic">'+es(v.nt)+'</div>';
    h+='</div>';
  });
  h+='<div class="div"></div><button class="btn red" style="margin-top:12px" onclick="elimC(\''+id+'\')">Eliminar contacto</button>';
  oMod(c.nm,h);
}
function elimC(id){
  if(!confirm('Eliminar permanentemente este contacto y todas sus visitas?'))return;
  D.cli=D.cli.filter(function(c){return c.id!==id;});D.vis=D.vis.filter(function(v){return v.cid!==id;});
  save();cMod();renderGC();toast('Eliminado','ok');
}
// GERENTE EMBUDO
var gEF2='Todos';
function renderGE(){
  var all=['Todos'].concat(ET,SA);
  document.getElementById('gEF').innerHTML=all.map(function(e){return '<span class="fb'+(gEF2===e?' on':'')+'" onclick="sGEF(\''+es(e)+'\')">'+es(e)+'</span>';}).join('');
  var cs=gEF2==='Todos'?D.cli.slice():D.cli.filter(function(c){return c.etapaEmbudo===gEF2;});
  var h='<div style="padding:8px 14px;font-size:11px;color:var(--muted);font-weight:700">'+cs.length+' REGISTROS</div>';
  if(!cs.length){h+='<div class="empty">Sin contactos</div>';document.getElementById('gEB').innerHTML=h;return;}
  cs.forEach(function(c){
    var col=EC[c.etapaEmbudo]||'var(--muted)';var nv=D.vis.filter(function(v){return v.cid===c.id;}).length;
    h+='<div class="cc" onclick="aFicha(\''+c.id+'\')" style="cursor:pointer"><div style="display:flex;align-items:center;gap:10px"><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700">'+es(c.nm)+'</div><div style="font-size:12px;color:var(--muted)">'+es(c.bar||'')+(c.tipo?' · '+es(c.tipo):'')+'</div></div><div style="text-align:right"><span style="background:rgba('+h2r(col)+',.15);color:'+col+';padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700">'+es(c.etapaEmbudo||'')+'</span><div style="font-size:10px;color:var(--muted);margin-top:3px">'+nv+' visita'+(nv!==1?'s':'')+'</div></div></div></div>';
  });
  document.getElementById('gEB').innerHTML=h;
}
function sGEF(f){gEF2=f;renderGE();}
// GERENTE VISITAS
var gVF2='7d';
function renderGV(){
  var fs=[{k:'h',l:'Hoy'},{k:'7d',l:'7 dias'},{k:'30d',l:'30 dias'},{k:'all',l:'Todas'}];
  document.getElementById('gVF').innerHTML=fs.map(function(f){return '<span class="fb'+(gVF2===f.k?' on':'')+'" onclick="sGVF(\''+f.k+'\')">'+f.l+'</span>';}).join('')+'<span class="fb" onclick="expCSV()" style="margin-left:auto">Exportar CSV</span>';
  var vs=D.vis.slice().reverse();
  var hoy=new Date().toISOString().split('T')[0];
  if(gVF2==='h')vs=vs.filter(function(v){return v.fecha===hoy;});
  else if(gVF2==='7d')vs=vs.filter(function(v){return dias(v.fecha)<=7;});
  else if(gVF2==='30d')vs=vs.filter(function(v){return dias(v.fecha)<=30;});
  var h='<div style="padding:8px 14px;font-size:11px;color:var(--muted);font-weight:700">'+vs.length+' VISITAS</div>';
  if(!vs.length){h+='<div class="empty">Sin visitas en este periodo</div>';document.getElementById('gVB').innerHTML=h;return;}
  vs.forEach(function(v){
    var c=D.cli.find(function(x){return x.id===v.cid;});
    h+='<div class="vh" style="cursor:pointer" onclick="'+(c?'aFicha(\''+c.id+'\')':'')+'"><div class="vhd">'+fmt(v.fecha)+(v.vend?' · '+es(v.vend):'')+'</div>';
    h+='<div class="vhr">'+es(c?c.nm:'?')+' — '+(v.tipo==='prospecto'?'Visita prospecto':v.vendio===true?'VENTA':'Sin venta')+'</div>';
    if(v.vendio===false&&v.razones)h+='<div class="vhx">'+es(Array.isArray(v.razones)?v.razones.join(', '):v.razones)+'</div>';
    h+='</div>';
  });
  document.getElementById('gVB').innerHTML=h;
}
function sGVF(f){gVF2=f;renderGV();}
function expCSV(){
  var rows=['Fecha,Vendedor,Cliente,Tipo,Venta,Motivo,Etapa,Notas'];
  D.vis.forEach(function(v){var c=D.cli.find(function(x){return x.id===v.cid;});var m=v.razones?(Array.isArray(v.razones)?v.razones.join('; '):v.razones):'';rows.push([v.fecha,v.vend||'',(c?c.nm:'?'),v.tipo||'',v.vendio===true?'SI':v.vendio===false?'NO':'',m,v.eta||'',v.nt||''].map(function(f){return '"'+String(f).replace(/"/g,'""')+'"';}).join(','));});
  var blob=new Blob([rows.join('\n')],{type:'text/csv;charset=utf-8;'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='visitas_'+new Date().toISOString().split('T')[0]+'.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('CSV exportado','ok');
}
// GERENTE COMODATOS
var gCoF2='act';
function renderGCo(){
  document.getElementById('gCoF').innerHTML=['act','ret','all'].map(function(f){return '<span class="fb'+(gCoF2===f?' on':'')+'" onclick="sGCoF(\''+f+'\')">'+(f==='act'?'Activos':f==='ret'?'Retirados':'Todos')+'</span>';}).join('');
  var cs=D.com.slice();
  if(gCoF2==='act')cs=cs.filter(function(c){return !c.ret;});
  else if(gCoF2==='ret')cs=cs.filter(function(c){return c.ret;});
  var h='<div style="padding:8px 14px;font-size:11px;color:var(--muted);font-weight:700">'+cs.length+' COMODATOS</div>';
  if(!cs.length){h+='<div class="empty">Sin comodatos</div>';document.getElementById('gCoB').innerHTML=h;return;}
  cs.forEach(function(co){
    h+='<div class="cc"><div style="display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-size:14px;font-weight:700">'+es(co.cnm||'?')+'</div><div style="font-size:12px;color:var(--muted)">Freezer #'+es(co.nro||'?')+(co.marca?' · '+es(co.marca):'')+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Entrega: '+fmt(co.fe)+(co.ret?' · Retiro: '+fmt(co.fr):'')+'</div></div><span class="tg '+(co.ret?'r':'g')+'">'+(co.ret?'RETIRADO':'ACTIVO')+'</span></div>';
    if(!co.ret){h+='<div style="display:flex;gap:6px;margin-top:8px"><button class="sm" onclick="retCo(\''+co.id+'\')" style="color:var(--orange)">Registrar retiro</button><button class="sm rd" onclick="delCo(\''+co.id+'\')">Eliminar</button></div>';}
    h+='</div>';
  });
  document.getElementById('gCoB').innerHTML=h;
}
function sGCoF(f){gCoF2=f;renderGCo();}
function nuevoComodato(){
  var cH=D.cli.filter(function(c){return !c.esP;}).sort(function(a,b){return(a.nm||'').localeCompare(b.nm||'');}).map(function(c){return '<option value="'+c.id+'">'+es(c.nm)+'</option>';}).join('');
  var mH=(D.cfg.marcas||[]).map(function(m){return '<option>'+es(m)+'</option>';}).join('');
  oMod('Nuevo comodato','<div class="fg"><label class="fl">Cliente</label><select class="fi" id="coC"><option value="">Seleccionar...</option>'+cH+'</select></div><div class="fg"><label class="fl">N° de freezer</label><input class="fi" id="coN" placeholder="Ej: 042"></div><div class="fg"><label class="fl">Marca</label><select class="fi" id="coM"><option value="">Seleccionar...</option>'+mH+'</select></div><div class="fg"><label class="fl">Fecha de entrega</label><input class="fi" type="date" id="coF" value="'+new Date().toISOString().split('T')[0]+'"></div><div class="fg"><label class="fl">Observaciones</label><textarea class="fi fta" id="coO" placeholder="Notas..."></textarea></div><button class="btn" onclick="saveCo()">Guardar</button>');
}
function saveCo(){
  var cid=document.getElementById('coC').value;var nro=document.getElementById('coN').value.trim();
  if(!cid||!nro){toast('Completa cliente y numero de freezer','err');return;}
  var c=D.cli.find(function(x){return x.id===cid;});
  D.com.push({id:uid(),cid:cid,cnm:c?c.nm:'?',nro:nro,marca:document.getElementById('coM').value,fe:document.getElementById('coF').value,obs:document.getElementById('coO').value,ret:false,fr:''});
  save();cMod();renderGCo();toast('Comodato registrado','ok');
}
function retCo(id){var co=D.com.find(function(c){return c.id===id;});if(!co)return;co.ret=true;co.fr=new Date().toISOString().split('T')[0];save();renderGCo();toast('Retiro registrado','ok');}
function delCo(id){if(!confirm('Eliminar?'))return;D.com=D.com.filter(function(c){return c.id!==id;});save();renderGCo();toast('Eliminado','ok');}
// GERENTE CONFIG
function renderGCfg(){
  var su=D.cfg.syncUrl||'';
  var h='<div style="padding:14px">';
  h+='<div class="card"><div class="ct">Sincronizacion Google Sheets</div>';
  h+='<div style="font-size:11px;font-weight:700;margin-bottom:8px;color:'+(su?'var(--green)':'var(--muted)')+'">'+(su?'Conectado':'Sin configurar')+'</div>';
  h+='<div class="fg"><label class="fl">URL del Apps Script</label><input class="fi" id="cfgS" type="url" placeholder="https://script.google.com/..." value="'+es(su)+'"></div>';
  h+='<div style="display:flex;gap:8px"><button class="btn" onclick="savSync()" style="flex:1">Guardar URL</button><button class="btn sec" onclick="sincBajar(function(ok){if(ok)renderGD();})" style="flex:1">Bajar datos</button><button class="btn sec" onclick="sincSubir(null)" style="flex:1">Subir datos</button></div></div>';
  // Usuarios
  h+='<div class="card"><div class="ct">Usuarios</div>';
  D.usrs.forEach(function(u){h+='<div class="sr"><div><div style="font-size:13px;font-weight:700">'+es(u.n)+'</div><div style="font-size:11px;color:var(--muted)">@'+es(u.u)+' · '+es(u.r)+'</div></div><button class="sm" onclick="cambPass(\''+u.id+'\')" style="font-size:11px">Cambiar pass</button></div>';});
  h+='</div>';
  // Mensajes embudo
  h+='<div class="card"><div class="ct">Mensajes del pipeline</div>';
  ET.concat(SA).forEach(function(et,i){var msg=(D.cfg.msgs&&D.cfg.msgs[et])||MD[et]||'';h+='<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:700;color:'+(EC[et]||'var(--muted)')+';margin-bottom:4px">'+es(et)+'</div><textarea class="fi fta" id="msg'+i+'" data-et="'+es(et)+'" rows="2">'+es(msg)+'</textarea></div>';});
  h+='<button class="btn" onclick="savMsgs()">Guardar mensajes</button></div>';
  // Listas editables
  var lsts=[{k:'barrios',l:'Barrios'},{k:'tipos',l:'Tipos de negocio'},{k:'razones',l:'Razones de no venta'},{k:'marcas',l:'Marcas de freezer'}];
  lsts.forEach(function(li){h+='<div class="card"><div style="display:flex;align-items:center;margin-bottom:10px"><div class="ct" style="margin-bottom:0;flex:1">'+li.l+'</div><button class="sm" onclick="editLst(\''+li.k+'\',\''+li.l+'\')">Editar</button></div><div style="font-size:12px;color:var(--muted)">'+es((D.cfg[li.k]||[]).join(' · '))+'</div></div>';});
  // Backup
  h+='<div class="card"><div class="ct">Backup de datos</div><div class="fg" style="font-size:12px;color:var(--muted)">Exporta antes de actualizar el CRM para no perder datos.</div><div style="display:flex;gap:8px"><button class="btn" onclick="expDatos()">Exportar JSON</button><label class="btn sec" style="text-align:center;cursor:pointer">Importar JSON<input type="file" accept=".json" style="display:none" onchange="impDatos(this)"></label></div></div>';
  h+='<div style="font-size:10px;color:var(--muted);text-align:center;margin-top:12px;padding-bottom:20px">CRM Sei Tu · v1.0 · jledes1988.github.io/crm</div></div>';
  document.getElementById('gCfgB').innerHTML=h;
}
function savSync(){var u=document.getElementById('cfgS').value.trim();D.cfg.syncUrl=u;save();toast(u?'URL guardada':'URL eliminada','ok');}
function savMsgs(){ET.concat(SA).forEach(function(et,i){var el=document.getElementById('msg'+i);if(el)D.cfg.msgs[et]=el.value;});save();toast('Mensajes guardados','ok');}
function cambPass(uid2){oMod('Cambiar contrasena','<div class="fg"><label class="fl">Nueva contrasena</label><input class="fi" type="password" id="np" placeholder="Min 4 caracteres"></div><button class="btn" onclick="confPass(\''+uid2+'\')">Cambiar</button>');}
function confPass(uid2){var p=document.getElementById('np').value;if(!p||p.length<4){toast('Min 4 caracteres','err');return;}var u=D.usrs.find(function(x){return x.id==uid2;});if(!u)return;u.p=p;if(D.user&&D.user.id==uid2)D.user.p=p;save();cMod();toast('Contrasena actualizada','ok');}
function editLst(k,l){
  var items=D.cfg[k]||[];
  var h='<div id="liI">'+items.map(function(it,i){return '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)"><span style="flex:1;font-size:13px">'+es(it)+'</span><button class="sm rd" onclick="delLI(\''+k+'\','+i+')">&#215;</button></div>';}).join('')+'</div>';
  h+='<div style="display:flex;gap:8px;margin-top:12px"><input class="fi" id="nwI" placeholder="Nuevo..." style="flex:1"><button class="sm g" onclick="addLI(\''+k+'\')">+</button></div>';
  oMod('Editar · '+l,h);
}
function delLI(k,i){D.cfg[k].splice(i,1);save();editLst(k,k);renderGCfg();}
function addLI(k){var v=document.getElementById('nwI').value.trim();if(!v)return;D.cfg[k].push(v);save();document.getElementById('nwI').value='';editLst(k,k);renderGCfg();}
function expDatos(){var d={version:'1.0',fecha:new Date().toISOString().split('T')[0],clientes:D.cli,visitas:D.vis,comodatos:D.com,config:D.cfg,usrs:D.usrs};var blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='CRM-SeiTu-'+d.fecha+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('Backup exportado','ok');}
function impDatos(inp){var f=inp.files&&inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{var d=JSON.parse(r.result);if(!d.clientes)throw new Error('Archivo invalido');if(!confirm('Esto reemplaza todos los datos. Continuar?'))return;D.cli=d.clientes||[];D.vis=d.visitas||[];D.com=d.comodatos||[];if(d.config)D.cfg=d.config;if(d.usrs)D.usrs=d.usrs;save();renderGD();toast(D.cli.length+' contactos importados','ok');}catch(e){toast('Error: '+e.message,'err');}};r.readAsText(f);}
// INIT
window.addEventListener('load',function(){
  load();
  var ses=lg('jses',null);
  if(ses){var u=D.usrs.find(function(x){return x.id===ses.id;});if(u){D.user=u;startApp();return;}}
  // Enter en login
  document.getElementById('lP').addEventListener('keypress',function(e){if(e.key==='Enter')doLogin();});
  document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)cMod();});
});
</script>
