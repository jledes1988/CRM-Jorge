<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CRM-JORGE">
<meta name="application-name" content="CRM-JORGE">
<meta name="theme-color" content="#22d3ee">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CRM-JORGE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d18;--s1:#13131f;--s2:#1a1a2e;--s3:#22223a;--border:#2d2d4a;--cyan:#22d3ee;--orange:#fb923c;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--purple:#a78bfa;--text:#f0f4ff;--muted:#6b7280;--r:12px;--rsm:8px;--rc:14px}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;line-height:1.4}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.sc{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.sc.on{display:flex}
.scr{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.scr::-webkit-scrollbar{display:none}
/* TOPBAR */
.tb{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;min-height:54px}
.tb-t{font-size:16px;font-weight:700;flex:1}
.tb-s{font-size:11px;color:var(--muted)}
.tb-bk{background:none;border:none;color:var(--cyan);font-size:22px;cursor:pointer;padding:4px 8px 4px 0;line-height:1}
/* BOTTOM NAV */
#vNav{display:flex;background:var(--s1);border-top:1px solid var(--border);flex-shrink:0}
.vb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 12px;border:none;background:none;color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.3px}
.vb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.vb.on{color:var(--cyan)}
/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rc);padding:14px;margin-bottom:10px}
.ct{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.cc{background:var(--s1);border:1px solid var(--border);border-radius:var(--rc);padding:13px;margin-bottom:9px}
/* BUTTONS */
.btn{display:block;width:100%;padding:14px;background:var(--cyan);color:#000;font-weight:800;font-size:15px;border:none;border-radius:var(--r);cursor:pointer;margin-top:8px;letter-spacing:.3px}
.btn.sec{background:var(--s3);color:var(--text);border:1px solid var(--border)}
.btn.red{background:var(--red);color:#fff}
.btn.or{background:var(--orange);color:#000}
.sm{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;border-radius:20px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.sm.g{background:rgba(74,222,128,.12);border-color:var(--green);color:var(--green)}
.sm.wa{background:rgba(37,211,102,.12);border-color:#25D366;color:#25D366}
.sm.cy{background:rgba(34,211,238,.15);border-color:var(--cyan);color:var(--cyan)}
.sm.rd{color:var(--red)}
.fab{position:fixed;bottom:80px;right:16px;width:56px;height:56px;border-radius:50%;background:var(--cyan);border:none;color:#000;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(34,211,238,.4);z-index:100;line-height:1}
/* FORMS */
.fi{display:block;width:100%;padding:12px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--cyan)}
.fta{min-height:80px;resize:vertical}
.fl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.fg{margin-bottom:14px}
/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.ch{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--s2);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.ch.on{background:rgba(34,211,238,.15);border-color:var(--cyan);color:var(--cyan)}
.ch.on.gon{background:rgba(74,222,128,.15);border-color:var(--green);color:var(--green)}
.ch.on.ron{background:rgba(248,113,113,.15);border-color:var(--red);color:var(--red)}
.ch.on.oon{background:rgba(251,146,60,.15);border-color:var(--orange);color:var(--orange)}
/* WIZARD */
.wp{height:3px;background:var(--s3);flex-shrink:0}
.wf{height:100%;background:var(--cyan);transition:width .3s}
/* TAGS */
.tg{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700}
.tg.c{background:rgba(34,211,238,.12);color:var(--cyan)}
.tg.g{background:rgba(74,222,128,.12);color:var(--green)}
.tg.o{background:rgba(251,146,60,.12);color:var(--orange)}
.tg.r{background:rgba(248,113,113,.12);color:var(--red)}
.tg.m{background:var(--s3);color:var(--muted)}
/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sb{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:12px}
.sn{font-size:28px;font-weight:900;line-height:1}
.sl2{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.bc{display:flex;flex-direction:column;gap:8px}
.br{display:flex;align-items:center;gap:8px;font-size:12px}
.bl{width:110px;flex-shrink:0;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bt{flex:1;height:8px;background:var(--s3);border-radius:4px;overflow:hidden}
.bf{height:100%;border-radius:4px}
.bv{width:28px;text-align:right;color:var(--muted);flex-shrink:0}
/* MISC */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
#modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);align-items:flex-end}
#modal.on{display:flex}
.mb{background:var(--s1);border-radius:var(--rc) var(--rc) 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto}
.mt{font-size:18px;font-weight:800;margin-bottom:14px}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--s3);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.on{opacity:1}
.div{height:1px;background:var(--border);margin:12px 0}
.filts{display:flex;gap:6px;overflow-x:auto;padding:10px 14px;flex-shrink:0}
.filts::-webkit-scrollbar{display:none}
.fb{padding:7px 14px;border-radius:20px;background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.fb.on{background:rgba(34,211,238,.15);border-color:var(--cyan);color:var(--cyan)}
.srch{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:8px 14px;margin:0 14px 10px}
.srch input{background:none;border:none;outline:none;color:var(--text);font-size:14px;flex:1;font-family:inherit}
.srch svg{width:15px;height:15px;stroke:var(--muted);fill:none;flex-shrink:0}
.vh{background:var(--s2);border-radius:var(--rsm);padding:11px;margin-bottom:8px}
.vhd{font-size:10px;color:var(--cyan);font-weight:700;margin-bottom:4px}
.vhr{font-size:13px;font-weight:700;margin-bottom:2px}
.vhx{font-size:12px;color:var(--muted)}
.ph{display:flex;align-items:center;gap:10px;background:var(--s2);border-radius:var(--rsm);padding:12px;cursor:pointer;margin-bottom:8px}
.pb{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px dashed var(--border);border-radius:var(--rsm);padding:12px;cursor:pointer;margin-top:8px}
.pb span{font-size:13px;font-weight:600;color:var(--cyan)}
.pp{width:100%;border-radius:var(--rsm);margin-top:8px;display:none}
/* LOGIN */
#sLogin{background:var(--bg);justify-content:center;align-items:center}
.lb{width:100%;max-width:360px;padding:28px 24px}
.ll{font-size:32px;font-weight:900;color:var(--cyan);letter-spacing:-1px;margin-bottom:4px}
.ls{font-size:13px;color:var(--muted);margin-bottom:32px}
/* TOGGLE */
.sw{position:relative;display:inline-block;width:44px;height:26px}
.sw input{opacity:0;width:0;height:0}
.sl3{position:absolute;cursor:pointer;inset:0;background:var(--s3);border-radius:13px;transition:.3s}
.sl3:before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.sl3{background:var(--cyan)}
input:checked+.sl3:before{transform:translateX(18px)}
.sr{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
/* GERENTE SIDE */
#gMobBar{display:flex;align-items:center;padding:12px 14px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0}
#gOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90}
#sGerente{flex-direction:column}
#gSide{position:fixed;top:0;left:-220px;height:100vh;width:200px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 0;z-index:100;transition:left .25s;overflow-y:auto}
#gSide.open{left:0}
#gCont{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.glo{padding:8px 18px 20px;font-size:17px;font-weight:900;color:var(--cyan)}
.gb{display:flex;align-items:center;gap:10px;padding:11px 18px;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;width:100%;text-align:left}
.gb svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.gb.on{color:var(--cyan);background:rgba(34,211,238,.08)}
@media(min-width:768px){
  #gMobBar{display:none!important}
  #gOverlay{display:none!important}
  #sGerente{flex-direction:row!important}
  #gSide{position:relative;left:0!important;height:auto;transition:none;width:200px;flex-shrink:0}
  .sg{grid-template-columns:1fr 1fr 1fr 1fr}
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div class="sc on" id="sBoot" style="align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="font-size:13px;font-weight:700;color:var(--cyan);letter-spacing:.5px">CRM COMERCIAL</div>
  <div id="sBootMsg" style="color:var(--muted);font-size:13px">Conectando...</div>
</div>
<div class="sc" id="sLogin">
  <div class="lb">
    <div class="ll">CRM Comercial</div>
    <div class="ls">Jorge Ledesma</div>
    <div class="fg"><label class="fl">Usuario</label><input class="fi" id="lU" type="text" autocomplete="username" autocorrect="off" autocapitalize="none"></div>
    <div class="fg"><label class="fl">Contrasena</label><input class="fi" id="lP" type="password" autocomplete="current-password"></div>
    <div id="lErr" style="color:var(--red);font-size:13px;margin-bottom:10px;display:none"></div>
    <button class="btn" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<!-- VENDEDOR -->
<div class="sc" id="sVen">
  <!-- HOY -->
  <div class="sc on" id="sVH">
    <div class="tb">
      <div style="flex:1"><div class="tb-t" id="vNm">Hola!</div><div class="tb-s" id="vDt"></div></div>
      <button class="sm" onclick="sincronizarManual()"><span id="syncDot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:4px;flex-shrink:0"></span>Sync</button>
      <button class="sm" onclick="if(confirm('Cerrar sesion?'))doLogout()" style="color:var(--red)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Salir</button>
    </div>
    <div class="scr" id="vHB"></div>
    <button class="fab" onclick="nuevoPros()">+</button>
  </div>
  <!-- CONTACTOS -->
  <div class="sc" id="sVC">
    <div class="tb">
      <div class="tb-t">Contactos</div>
      <button class="sm" onclick="abrirFiltros()" style="margin-left:auto">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>Filtros
      </button>
      <button class="sm g" onclick="nuevoPros()">+ Nuevo</button>
    </div>
    <div id="vCActivos" style="padding:6px 14px;border-bottom:1px solid var(--border);display:none;overflow-x:auto;white-space:nowrap"></div>
    <div class="srch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="vCQ" placeholder="Buscar nombre o direccion..." oninput="renderVC()"></div>
    <div class="scr" id="vCB"></div>
  </div>
  <!-- EMBUDO -->
  <div class="sc" id="sVE">
    <div class="tb"><div class="tb-t">Embudo de venta</div></div>
    <div class="filts" id="vEF"></div>
    <div class="scr" id="vEB"></div>
  </div>
  <!-- GIRA -->
  <div class="sc" id="sVG">
    <div style="display:flex;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0">
      <button id="gTPl" onclick="setGTab('plan')" style="flex:1;padding:12px;border:none;background:none;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent">PLANIFICAR</button>
      <button id="gTEj" onclick="setGTab('ejec')" style="flex:1;padding:12px;border:none;background:none;color:var(--cyan);font-size:12px;font-weight:700;cursor:pointer;border-bottom:2px solid var(--cyan)">EJECUTAR HOY</button>
    </div>
    <div class="scr" id="vGB"></div>
  </div>
</div>

<!-- WIZARD -->
<div class="sc" id="sWiz">
  <div class="tb">
    <button class="tb-bk" onclick="wBack()">&#8592;</button>
    <div style="flex:1"><div class="tb-t" id="wT"></div><div class="tb-s" id="wS"></div></div>
    <div style="font-size:12px;color:var(--muted);font-weight:700" id="wL"></div>
  </div>
  <div class="wp"><div class="wf" id="wP"></div></div>
  <div class="scr" id="wB"></div>
  <div style="padding:10px 14px 14px;flex-shrink:0;display:flex;gap:8px">
    <button class="btn sec" id="wBk" onclick="wPrev()" style="flex:1;display:none">Volver</button>
    <button class="btn or" id="wNx" onclick="wNext()" style="flex:1">Siguiente</button>
  </div>
</div>

<!-- GERENTE -->
<div class="sc" id="sGerente">
  <!-- Topbar móvil (solo celular) -->
  <div id="gMobBar">
    <button onclick="toggleGSide()" style="background:none;border:none;color:var(--cyan);cursor:pointer;padding:4px;margin-right:12px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div style="font-size:14px;font-weight:700;color:var(--cyan);flex:1">CRM Comercial</div>
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)">
      <span id="syncDotAdmin" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green)"></span>
      <span id="gMobUser"></span>
    </div>
  </div>
  <!-- Overlay para cerrar menú -->
  <div id="gOverlay" onclick="toggleGSide()"></div>
  <!-- Side nav -->
  <div id="gSide">
    <div class="glo" style="padding-bottom:4px">CRM Comercial</div>
    <div id="gSideUser" style="padding:0 18px 16px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px"><span id="syncDotAdmin2" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green)"></span><span id="gSideUserNm"></span></div>
    <button class="gb on" id="gbD" onclick="gGo('D')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</button>
    <button class="gb" id="gbC" onclick="gGo('C')"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Contactos</button>
    <button class="gb" id="gbE" onclick="gGo('E')"><svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>Embudo</button>
    <button class="gb" id="gbV" onclick="gGo('V')"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Visitas</button>
    <button class="gb" id="gbCo" onclick="gGo('Co')"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>Comodatos</button>
    <button class="gb" id="gbI" onclick="gGo('I')"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Informes</button>
    <button class="gb" id="gbCfg" onclick="gGo('Cfg')" style="margin-top:auto"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Config</button>
    <button class="gb" onclick="doLogout()" style="color:var(--red)"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Salir</button>
  </div>
  <!-- Contenido -->
  <div id="gCont">
    <div class="sc on" id="sGD"><div class="scr" id="gDB"></div></div>
    <div class="sc" id="sGC">
      <div class="tb"><div class="tb-t">Contactos</div><button class="sm g" onclick="nuevoProsAdmin()" style="margin-left:auto">+ Nuevo</button></div>
      <div class="filts" id="gCF"></div>
      <div class="srch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="gCS" placeholder="Buscar..." oninput="renderGC()"></div>

// Convierte snapshot de coleccion en array, usando doc.id como id del registro
function fsSnapToArr(snap){
  var out=[];
  snap.forEach(function(doc){var d=doc.data();d.id=doc.id;out.push(d);});
  return out;
}

function fsSetupListeners(){
  fsBootMsg('Sincronizando contactos...');
  fsDB.collection('contactos').onSnapshot(function(snap){
    D.cli=fsSnapToArr(snap);
    normalizarDatos();
    DEBUG_LASTSYNC.contactos=new Date().toISOString();
    fsOnFirstLoad();
    refrescarVistaActual();
  },function(err){debugLog('error','contactos: '+err.message);toast('Error de sincronizacion: contactos','err');});

  fsDB.collection('visitas').onSnapshot(function(snap){
    D.vis=fsSnapToArr(snap);
    DEBUG_LASTSYNC.visitas=new Date().toISOString();
    fsOnFirstLoad();
    refrescarVistaActual();
  },function(err){debugLog('error','visitas: '+err.message);});

  fsDB.collection('comodatos').onSnapshot(function(snap){
    D.com=fsSnapToArr(snap);
    DEBUG_LASTSYNC.comodatos=new Date().toISOString();
    fsOnFirstLoad();
    refrescarVistaActual();
  },function(err){debugLog('error','comodatos: '+err.message);});

  fsDB.collection('gira').onSnapshot(function(snap){
    D.gira=fsSnapToArr(snap);
    DEBUG_LASTSYNC.gira=new Date().toISOString();
    fsOnFirstLoad();
    refrescarVistaActual();
  },function(err){debugLog('error','gira: '+err.message);});

  fsDB.collection('log').onSnapshot(function(snap){
    D.log=fsSnapToArr(snap).sort(function(a,b){return(a.ts||'').localeCompare(b.ts||'');});
    DEBUG_LASTSYNC.log=new Date().toISOString();
    fsOnFirstLoad();
  },function(err){debugLog('error','log: '+err.message);});

  var USUARIOS_DEFAULT=[
    {id:1,n:'JL',u:'jl',p:'seitu2026',r:'admin',activo:true,creado:'2026-06-01',ua:''},
    {id:2,n:'Jorge',u:'jorge',p:'seitu2026',r:'vendedor',activo:true,creado:'2026-06-01',ua:''},
    {id:3,n:'Chamu',u:'chamu',p:'seitu2026',r:'vendedor',activo:true,creado:'2026-06-01',ua:''},
    {id:4,n:'Pablo',u:'pablo',p:'seitu2026',r:'vendedor',activo:true,creado:'2026-06-01',ua:''}
  ];
  fsDB.collection('usuarios').onSnapshot(function(snap){
    var arr=fsSnapToArr(snap);
    // Reparar usuarios faltantes (cubre tanto coleccion vacia como parcialmente poblada,
    // que es justo lo que paso: el primer vendedor que logueo creo SOLO su propio documento
    // y el listener pisaba D.usrs entero, haciendo desaparecer a JL y al resto)
    var faltantes=USUARIOS_DEFAULT.filter(function(def){return !arr.some(function(a){return a.u===def.u;});});
    if(faltantes.length){
      var batch=fsDB.batch();
      faltantes.forEach(function(u){batch.set(fsDB.collection('usuarios').doc(String(u.id)),u);});
      batch.commit().catch(function(e){console.error('reparar usuarios',e);});
      // No hace falta esperar: el propio onSnapshot se va a volver a disparar solo
      // cuando el batch se confirme, y entonces arr ya va a venir completo.
      if(!arr.length){fsOnFirstLoad();return;} // primera carga sin nada todavia: esperar la proxima vuelta
    }
    if(arr.length){D.usrs=arr.map(function(u){u.id=isNaN(u.id)?u.id:Number(u.id);return u;});}
    fsOnFirstLoad();
    // Si el usuario logueado fue desactivado o eliminado por el admin, cerrar sesion en el acto
    if(D.user&&FS_READY){
      var me=D.usrs.find(function(x){return x.u===D.user.u;});
      if(!me){toast('Tu usuario fue eliminado','err');doLogout();}
      else if(me.activo===false){toast('Tu usuario fue desactivado','err');doLogout();}
      else{D.user=me;}
    }
    DEBUG_LASTSYNC.usuarios=new Date().toISOString();
  },function(err){debugLog('error','usuarios: '+err.message);});

  fsDB.collection('config').doc('main').onSnapshot(function(doc){
    if(doc.exists){
      var data=doc.data();
      Object.keys(data).forEach(function(k){D.cfg[k]=data[k];});
    } else {
      // Primera vez: no existe el doc de config, lo creamos con los valores por defecto
      fsDB.collection('config').doc('main').set(CFG).catch(function(e){console.error(e);});
    }
    DEBUG_LASTSYNC.config=new Date().toISOString();
    fsOnFirstLoad();
  },function(err){debugLog('error','config: '+err.message);});
}

function fsArrancarApp(){
  document.getElementById('sBoot').classList.remove('on');
  var ses=lg('jses',null);
  if(ses){
    var fresh=D.usrs.find(function(u){return u.u===ses.u;});
    if(!fresh||fresh.activo===false){
      // El usuario fue eliminado o desactivado desde otro dispositivo: cerrar sesion
      ls('jses',null);
      document.getElementById('sLogin').classList.add('on');
      return;
    }
    D.user=fresh;
    startApp();
  } else {
    document.getElementById('sLogin').classList.add('on');
  }
}

function fsMigrarLocalAFirestore(){
  var cliLoc=lg('jc',[]),visLoc=lg('jv',[]),comLoc=lg('jo',[]),giraLoc=lg('jg',[]);
  if(!cliLoc.length&&!visLoc.length&&!comLoc.length&&!giraLoc.length){
    toast('No hay datos locales para migrar','err');return;
  }
  if(!confirm('Se van a subir '+cliLoc.length+' contactos, '+visLoc.length+' visitas, '+comLoc.length+' comodatos y '+giraLoc.length+' entradas de gira que estan guardadas solo en este dispositivo. Continuar?'))return;
  var batch=fsDB.batch();
  cliLoc.forEach(function(c){if(!c.prods)c.prods=[];batch.set(fsDB.collection('contactos').doc(c.id),c);});
  visLoc.forEach(function(v){batch.set(fsDB.collection('visitas').doc(v.id),v);});
  comLoc.forEach(function(co){batch.set(fsDB.collection('comodatos').doc(co.id),co);});
  giraLoc.forEach(function(g){var gid=g.cid+'_'+g.fecha;batch.set(fsDB.collection('gira').doc(gid),g);});
  batch.commit().then(function(){
    toast('Migracion completa: '+cliLoc.length+' contactos subidos','ok');
  }).catch(function(e){toast('Error en la migracion: '+e.message,'err');});
}

// UTILS
function uid(){return Date.now()+Math.random().toString(36).slice(2,5);}
function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lg(k,d){try{var v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch(e){return d;}}
function fmt(d){if(!d||d==='')return '--';try{var p=String(d).split('-');if(p.length!==3)return d;return parseInt(p[2])+'/'+parseInt(p[1])+'/'+p[0].slice(2);}catch(e){return d;}}
function dias(d){if(!d)return null;return Math.floor((Date.now()-new Date(d+'T12:00:00'))/86400000);}
function es(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function h2r(h){return parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16);}
function toast(m,t){var el=document.getElementById('toast');el.textContent=m;el.className='on';el.style.background=t==='err'?'rgba(248,113,113,.2)':t==='ok'?'rgba(74,222,128,.2)':'rgba(34,211,238,.15)';el.style.color=t==='err'?'var(--red)':t==='ok'?'var(--green)':'var(--cyan)';setTimeout(function(){el.className='';},2500);}
// Normaliza campos por si llegan registros viejos/incompletos desde Firestore
function normalizarDatos(){
  D.cli.forEach(function(c){if(!c.etapaEmbudo||c.etapaEmbudo==='')c.etapaEmbudo=c.esP?'Nuevo Prospecto':'Cliente Activo';if(!c.uv)c.uv='';if(!c.ex)c.ex={};if(c.deu===undefined)c.deu=false;if(!c.ing)c.ing='';if(!c.vend)c.vend='';if(!c.prods)c.prods=[];if(!c.prov)c.prov='';if(!c.ciu)c.ciu='';});
  D.usrs.forEach(function(u){if(u.activo===undefined)u.activo=true;if(!u.creado)u.creado='';if(!u.ua)u.ua='';});
}
function cFoto(file,cb){var r=new FileReader();r.onload=function(){var i=new Image();i.onload=function(){var cv=document.createElement('canvas');var mx=900;var rt=Math.min(mx/i.width,mx/i.height,1);cv.width=Math.round(i.width*rt);cv.height=Math.round(i.height*rt);cv.getContext('2d').drawImage(i,0,0,cv.width,cv.height);cb(cv.toDataURL('image/jpeg',.72));};i.src=r.result;};r.readAsDataURL(file);}
// CHIPS
function ch(id,lbl,grp,multi,cls){return '<span class="ch'+(cls?' '+cls:'')+'" data-id="'+es(id)+'" data-g="'+grp+'" onclick="tc(this,'+(multi?'true':'false')+')" style="cursor:pointer">'+es(lbl)+'</span>';}
function tc(el,m){if(!m){document.querySelectorAll('[data-g="'+el.getAttribute('data-g')+'"]').forEach(function(e){e.classList.remove('on');});}el.classList.toggle('on');}
function gc(g){var e=document.querySelector('[data-g="'+g+'"].on');return e?e.getAttribute('data-id'):'';}
function gcs(g){var r=[];document.querySelectorAll('[data-g="'+g+'"].on').forEach(function(e){r.push(e.getAttribute('data-id'));});return r;}
function sc(g,v){document.querySelectorAll('[data-g="'+g+'"]').forEach(function(e){e.classList.toggle('on',e.getAttribute('data-id')===v);});}

// AUTH
function doLogin(){
  var u=document.getElementById('lU').value.trim();
  var p=document.getElementById('lP').value.trim();
  var e=document.getElementById('lErr');e.style.display='none';
  if(!u||!p){e.textContent='Ingresa usuario y contrasena.';e.style.display='block';return;}
  var usr=null;for(var i=0;i<D.usrs.length;i++){if(D.usrs[i].u===u&&D.usrs[i].p===p){usr=D.usrs[i];break;}}
  if(!usr){e.textContent='Usuario o contrasena incorrectos.';e.style.display='block';return;}
  if(usr.activo===false){e.textContent='Este usuario esta desactivado.';e.style.display='block';return;}
  usr.ua=new Date().toISOString();
  D.user=usr;
  ls('jses',D.user);
  fsSetUsuario(usr);
  startApp();
}
function startApp(){
  document.getElementById('sLogin').classList.remove('on');
  if(D.user.r==='gerente'||D.user.r==='admin'){
    document.getElementById('sGerente').classList.add('on');
    document.getElementById('vNav').style.display='none';
    var mu=document.getElementById('gMobUser');if(mu)mu.textContent=D.user.n;
    var su=document.getElementById('gSideUserNm');if(su)su.textContent=D.user.n+' · Admin';
    renderGD();
  } else {
    document.getElementById('sVen').classList.add('on');
    document.getElementById('vNav').style.display='flex';
    document.getElementById('vNm').textContent='Hola, '+D.user.n+'!';
    document.getElementById('vDt').textContent=new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
    renderVH();
    // Iniciar en tab ejecutar
    setGTab('ejec');
  }
}
function doLogout(){
  D.user=null;ls('jses',null);
  document.querySelectorAll('.sc').forEach(function(s){s.classList.remove('on');});
  document.getElementById('sLogin').classList.add('on');
  document.getElementById('vNav').style.display='none';
  document.getElementById('lU').value='';document.getElementById('lP').value='';
}
// NAV
function today(){return new Date().toISOString().split('T')[0];}
function vGo(t){
  document.querySelectorAll('#sVen .sc').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.vb').forEach(function(b){b.classList.remove('on');});
  var m={H:['sVH','vbH',renderVH],C:['sVC','vbC',renderVC],E:['sVE','vbE',renderVE],G:['sVG','vbG',renderVG]};
  if(m[t]){document.getElementById(m[t][0]).classList.add('on');document.getElementById(m[t][1]).classList.add('on');m[t][2]();}
}
function showWiz(){
  var esAdmin=D.user&&D.user.r==='admin';
  W.origenAdmin=esAdmin;
  document.getElementById(esAdmin?'sGerente':'sVen').classList.remove('on');
  document.getElementById('sWiz').classList.add('on');
  if(!esAdmin)document.getElementById('vNav').style.display='none';
}
function hideWiz(){
  document.getElementById('sWiz').classList.remove('on');
  if(W.origenAdmin){
    document.getElementById('sGerente').classList.add('on');
  } else {
    document.getElementById('sVen').classList.add('on');
    document.getElementById('vNav').style.display='flex';
  }
}

// ── HOY ───────────────────────────────────────────────────────────────
function renderVH(){
  var hoy=today();
  var misCli=misContactos();
  var visHoy=D.vis.filter(function(v){return v.fecha===hoy&&(!D.user||v.vend===D.user.n);});
  var prosHoy=misCli.filter(function(c){return c.ing===hoy;});
  var giraHoy=D.gira.filter(function(g){return g.fecha===hoy;}).map(function(g){return D.cli.find(function(c){return c.id===g.cid;});}).filter(Boolean);
  var pendientes=giraHoy.filter(function(c){return !visHoy.some(function(v){return v.cid===c.id;});});
  var visitados=giraHoy.filter(function(c){return visHoy.some(function(v){return v.cid===c.id;});});
  var ventasHoy=visHoy.filter(function(v){return v.vendio===true;}).length;
  var h='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">';
  h+='<div class="sb"><div class="sn">'+visHoy.length+'</div><div class="sl2">Visitas</div></div>';

  h+='<div class="sb"><div class="sn" style="color:var(--orange)">'+prosHoy.length+'</div><div class="sl2">Prospectos</div></div>';
  h+='</div>';
  if(!visHoy.length&&!prosHoy.length){
    h+='<div class="card" style="text-align:center;padding:24px"><div style="font-size:36px;margin-bottom:10px">&#128197;</div>';
    h+='<div style="font-size:16px;font-weight:700;margin-bottom:6px">Sin actividad registrada hoy</div>';
    h+='<div style="font-size:13px;color:var(--muted);margin-bottom:16px">Ejecuta la gira o agrega un prospecto nuevo</div>';
    h+='<button class="btn" onclick="vGo(\'G\')" style="margin:0 0 8px">Ir a la Gira</button>';
    h+='<button class="btn or" onclick="nuevoPros()" style="margin:0">Nuevo prospecto</button></div>';
  } else {
    if(prosHoy.length){
      h+='<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">PROSPECTOS CARGADOS HOY</div>';

        h+='<div class="cc" style="cursor:default"><div style="font-size:14px;font-weight:700">'+es(c.nm)+'</div>';
        h+='<div style="font-size:12px;color:var(--muted)">'+es(c.bar||'')+(c.tipo?' · '+es(c.tipo):'')+'</div>';
        h+='<span class="tg o" style="margin-top:6px;display:inline-flex">'+es(c.etapaEmbudo||'Nuevo Prospecto')+'</span></div>';
      });
    }
    if(visHoy.length){
      h+='<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px">VISITAS REGISTRADAS HOY</div>';
      visHoy.forEach(function(v){
        var c=D.cli.find(function(x){return x.id===v.cid;});
        h+='<div class="vh"><div class="vhd">'+fmt(v.fecha)+'</div>';
        h+='<div class="vhr">'+es(c?c.nm:'?')+'</div>';
        h+='<div class="vhx">'+(v.tipo==='prospecto'?'Visita prospecto':v.vendio===true?'Venta realizada':'Sin venta')+'</div>';

function guardarEdicionContacto(id){

  chk('nm',document.getElementById('eNm').value.trim());
  chk('fan',document.getElementById('eFan').value.trim());
  chk('tel',document.getElementById('eTel').value.trim());
  chk('dir',document.getElementById('eDir').value.trim());

  chk('tipo',gc('eTip'));

  var ncomp=gcs('eComp').join(', ');chk('comp',ncomp);

  chk('calU',gc('eCal'));
  chk('trans',gc('eTr'));
  chk('obs',document.getElementById('eObs').value.trim());
  if(cambios.length){
    c._modBy=D.user?D.user.n:'?';

// ── DASHBOARD GERENTE: INTELIGENCIA COMERCIAL ─────────────────────────
var gPer='mes';
function getPer(){
  var hoy=today();var d=new Date();var desde;
  if(gPer==='hoy')desde=hoy;
  else if(gPer==='sem'){d.setDate(d.getDate()-(d.getDay()===0?6:d.getDay()-1));desde=d.toISOString().split('T')[0];}
  else if(gPer==='mes'){desde=hoy.slice(0,7)+'-01';}
  else{desde=hoy.slice(0,4)+'-01-01';}
  return{desde:desde,hasta:hoy};
}
function getLunesSem(){var d=new Date();var dow=d.getDay()===0?6:d.getDay()-1;d.setDate(d.getDate()-dow);return d.toISOString().split('T')[0];}
function visEnPer(){var r=getPer();return D.vis.filter(function(v){return v.fecha>=r.desde&&v.fecha<=r.hasta;});}
function sG(titulo,cont){return '<div class="card" style="margin-bottom:12px"><div class="ct">'+es(titulo)+'</div>'+cont+'</div>';}

function renderGD(){
  var hoy=today();var per=getPer();var vis=visEnPer();

  var prospectos=D.cli.filter(function(c){return c.esP;});
  var vendedores=D.usrs.filter(function(u){return u.r==='vendedor';});
  // Metricas
  var pros_nuevos=prospectos.filter(function(c){return c.ing>=per.desde&&c.ing<=per.hasta;});
  var cli_visit=clientes.filter(function(c){return vis.some(function(v){return v.cid===c.id;});});
  var ventas=vis.filter(function(v){return v.vendio===true;});
  var conv=vis.filter(function(v){return v.conversion===true;});
  var com_per=D.com.filter(function(co){return co.fe>=per.desde&&co.fe<=per.hasta;});
  // Alertas
  var alertas=[];
  var sv30=clientes.filter(function(c){return !c.ul||dias(c.ul)>30;});
  if(sv30.length)alertas.push({t:'r',msg:sv30.length+' cliente'+(sv30.length!==1?'s':'')+' sin visita hace +30 dias',ids:sv30.map(function(c){return c.id;})});
  var ps7=prospectos.filter(function(c){return !c.ul||dias(c.ul)>7;});
  if(ps7.length)alertas.push({t:'r',msg:ps7.length+' prospecto'+(ps7.length!==1?'s':'')+' sin seguimiento hace +7 dias',ids:ps7.map(function(c){return c.id;})});
  var pest=prospectos.filter(function(c){return c.ul&&dias(c.ul)>14&&c.etapaEmbudo!=='Cliente Activo';});
  if(pest.length)alertas.push({t:'o',msg:pest.length+' prospecto'+(pest.length!==1?'s':'')+' estancado'+(pest.length!==1?'s':'')+' en el embudo sin avance +14 dias',ids:pest.map(function(c){return c.id;})});
  var msv=clientes.filter(function(c){var vc=D.vis.filter(function(v){return v.cid===c.id&&v.tipo==='cliente';}).slice(-3);return vc.length>=3&&vc.every(function(v){return v.vendio===false;});});
  if(msv.length)alertas.push({t:'o',msg:msv.length+' cliente'+(msv.length!==1?'s':'')+' con 3+ visitas consecutivas sin compra',ids:msv.map(function(c){return c.id;})});
  var ls=getLunesSem();
  var vb=vendedores.filter(function(u){return D.vis.filter(function(v){return v.vend===u.n&&v.fecha>=ls;}).length<3;});
  if(vb.length)alertas.push({t:'y',msg:'Baja actividad esta semana: '+vb.map(function(u){return u.n;}).join(', '),ids:null});
  var csv=D.com.filter(function(co){return !co.ret;}).filter(function(co){var c=D.cli.find(function(x){return x.id===co.cid;});return c&&(!c.ul||dias(c.ul)>30);});
  if(csv.length)alertas.push({t:'y',msg:csv.length+' cliente'+(csv.length!==1?'s':'')+' con comodato activo sin visita +30 dias',ids:csv.map(function(co){var c=D.cli.find(function(x){return x.id===co.cid;});return c?c.id:null;}).filter(Boolean)});
  var h='';
  // Filtro periodo
  h+='<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">';
  [{k:'hoy',l:'Hoy'},{k:'sem',l:'Esta semana'},{k:'mes',l:'Este mes'},{k:'ano',l:'Este ano'}].forEach(function(p){
    h+='<span class="fb'+(gPer===p.k?' on':'')+'" onclick="gPer=\''+p.k+'\';renderGD()">'+p.l+'</span>';

function expJSON(){

  var blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='CRM-backup-'+today()+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('Backup exportado','ok');
}
function impJSON(inp){
  if(!inp.files||!inp.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!confirm('Esto reemplazara TODOS los datos actuales en Firebase por los del backup. Confirmar?'))return;
      var batch=fsDB.batch();
      var nb=0;
      (data.cli||[]).forEach(function(c){batch.set(fsDB.collection('contactos').doc(c.id),c);nb++;});
      (data.vis||[]).forEach(function(v){batch.set(fsDB.collection('visitas').doc(v.id),v);nb++;});
      (data.com||[]).forEach(function(co){batch.set(fsDB.collection('comodatos').doc(co.id),co);nb++;});
      (data.gira||[]).forEach(function(g){var gid=g.cid+'_'+g.fecha;batch.set(fsDB.collection('gira').doc(gid),g);nb++;});
      if(data.cfg){batch.set(fsDB.collection('config').doc('main'),data.cfg,{merge:true});}
      (data.usrs||[]).forEach(function(u){batch.set(fsDB.collection('usuarios').doc(String(u.id)),u);});
      batch.commit().then(function(){
        toast('Backup restaurado correctamente ('+nb+' registros)','ok');
        renderGCfg();renderGD();
      }).catch(function(err){toast('Error al restaurar: '+err.message,'err');});
    }catch(err){toast('Archivo invalido o corrupto','err');}
  };
  reader.readAsText(inp.files[0]);
}

// ── AUTOCOMPLETE GENERICO (reemplaza datalist nativo, mas confiable en mobile) ──
function initAuto(inpId,suggId,getList){
  var inp=document.getElementById(inpId);var sugg=document.getElementById(suggId);
  if(!inp||!sugg)return;
  inp.oninput=function(){
    var q=inp.value.trim().toLowerCase();
    if(q.length<2){sugg.style.display='none';sugg.innerHTML='';return;}
    var list=getList();
    var matches=list.filter(function(x){return x.toLowerCase().indexOf(q)>=0;}).slice(0,8);
    if(!matches.length){sugg.style.display='none';sugg.innerHTML='';return;}
    sugg.innerHTML=matches.map(function(m){return '<div style="padding:11px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)" onmousedown="event.preventDefault();selAuto(\''+inpId+'\',\''+suggId+'\',this.textContent)">'+es(m)+'</div>';}).join('');
    sugg.style.display='block';
  };
  inp.onblur=function(){setTimeout(function(){sugg.style.display='none';},150);};
  inp.onfocus=function(){if(inp.value.trim().length>=2)inp.oninput();};
}
function selAuto(inpId,suggId,val){
  var inp=document.getElementById(inpId);

var W={steps:[],cur:0,data:{},cid:null,tipo:null,nu:false};
function wInit(t,steps,cid,tipo,nu){
  W.steps=steps;W.cur=0;W.data={};W.cid=cid;W.tipo=tipo;W.nu=!!nu;
  document.getElementById('wT').textContent=t;
  showWiz();wRender();
}
function wRender(){
  var s=W.steps[W.cur];var n=W.steps.length;
  document.getElementById('wS').textContent=s.sub||'';
  document.getElementById('wL').textContent=(W.cur+1)+'/'+n;
  document.getElementById('wP').style.width=(((W.cur+1)/n)*100)+'%';
  document.getElementById('wB').innerHTML=s.render(W.data,W.cid);
  document.getElementById('wBk').style.display=W.cur>0?'block':'none';
  var ul=W.cur===n-1;
  document.getElementById('wNx').textContent=ul?'Guardar':'Siguiente';
  document.getElementById('wNx').className=ul?'btn or':'btn';
  if(s.init)setTimeout(function(){s.init();},50);
}
function wBack(){
  if(W.cur===0){
    if(W.nu){
      var c=D.cli.find(function(x){return x.id===W.cid;});
      if(c&&!c.nm){
        D.cli=D.cli.filter(function(x){return x.id!==W.cid;});
        fsDelContacto(W.cid); // el alta ya se habia escrito en Firestore, hay que revertirla
      }
    }
    hideWiz();return;
  }
  W.cur--;wRender();
}
function wPrev(){W.cur--;wRender();}
function wNext(){
  var s=W.steps[W.cur];
  if(s.val){var e=s.val();if(e){toast(e,'err');return;}}
  if(s.sv)s.sv(W.data);
  if(W.cur===W.steps.length-1){wFin();}else{W.cur++;wRender();}
}
function wFin(){
  var v={id:uid(),cid:W.cid,fecha:today(),vend:D.user?D.user.n:'',tipo:W.tipo};
  Object.assign(v,W.data);
  D.vis.push(v);
  var c=D.cli.find(function(x){return x.id===W.cid;});
  if(c){c.ul=v.fecha;if(v.vendio===true)c.uv=v.fecha;if(v.prox)c.prox=v.prox;if(v.eta)c.etapaEmbudo=v.eta;if(v.deu!==undefined)c.deu=v.deu;}
  // Trazabilidad
  if(W.tipo==='cliente'){logEvento('visita',W.cid,c?c.nm:'?',v.vendio===true?'Visita con venta':'Visita sin venta','','');}
  else if(W.nu){logEvento('prospecto',W.cid,c?c.nm:'?','Nuevo prospecto registrado','','');}
  else{logEvento('visita',W.cid,c?c.nm:'?','Visita a prospecto','','');}
  fsSetVisita(v);
  if(c)fsSetContacto(c);

  if(W.cid)ls('jwiz_bk',{cid:W.cid,cur:W.cur,tipo:W.tipo,nu:W.nu,data:W.data});

  });

// ── GIRA SEMANAL ──────────────────────────────────────────────────────
var giraSemOffset=0; // 0=semana actual, 1=siguiente, etc.
function getLunesSemana(offset){
  var d=new Date();
  var dow=d.getDay();var diff=dow===0?-6:1-dow; // lunes de esta semana
  d.setDate(d.getDate()+diff+(offset*7));
  d.setHours(0,0,0,0);
  return d;
}
function renderGiraPlan(){
  var lunes=getLunesSemana(giraSemOffset);
  var labels=['Lun','Mar','Mie','Jue','Vie'];
  var hoy=today();
  // Header con flechas
  var lunesStr=lunes.toLocaleDateString('es-AR',{day:'numeric',month:'short'});
  var viernesD=new Date(lunes);viernesD.setDate(viernesD.getDate()+4);
  var viernesStr=viernesD.toLocaleDateString('es-AR',{day:'numeric',month:'short'});
  var puedeAtras=giraSemOffset>-52;
  var puedeAde=giraSemOffset<4;
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';
  h+='<button class="sm" onclick="cambiarSem(-1)" style="font-size:18px;padding:8px 14px;'+(puedeAtras?'':'opacity:.3;pointer-events:none')+'">&larr;</button>';
  h+='<div style="text-align:center"><div style="font-size:14px;font-weight:800">'+lunesStr+' — '+viernesStr+'</div><div style="font-size:11px;color:var(--muted)">'+(giraSemOffset===0?'Semana actual':giraSemOffset===1?'Proxima semana':'Semana '+(giraSemOffset>0?'+':'')+giraSemOffset)+'</div></div>';
  h+='<button class="sm" onclick="cambiarSem(1)" style="font-size:18px;padding:8px 14px;'+(puedeAde?'':'opacity:.3;pointer-events:none')+'">&rarr;</button></div>';
  // Grilla semanal
  h+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">';
  for(var i=0;i<5;i++){
    var dia=new Date(lunes);dia.setDate(dia.getDate()+i);
    var diaStr=dia.toISOString().split('T')[0];
    var planDia=D.gira.filter(function(g){return g.fecha===diaStr;});
    var esHoy=diaStr===hoy;
    var numDia=dia.getDate();
    h+='<div onclick="verDiaGira(\''+diaStr+'\')" style="background:var(--s1);border:1px solid '+(esHoy?'var(--cyan)':'var(--border)')+';border-radius:var(--rsm);padding:10px 6px;text-align:center;cursor:pointer;min-height:80px">';
    h+='<div style="font-size:10px;font-weight:700;color:'+(esHoy?'var(--cyan)':'var(--muted)')+';text-transform:uppercase;margin-bottom:3px">'+labels[i]+'</div>';
    h+='<div style="font-size:18px;font-weight:900;color:'+(esHoy?'var(--cyan)':'var(--text)')+'">'+numDia+'</div>';
    if(planDia.length){
      h+='<div style="margin-top:6px;background:'+(esHoy?'var(--cyan)':'var(--s3)')+';border-radius:10px;padding:2px 0;font-size:11px;font-weight:800;color:'+(esHoy?'#000':'var(--muted)')+'">'+planDia.length+'</div>';
    }
    h+='</div>';
  }
  h+='</div>';
  h+='<div style="margin-top:14px"><button class="btn sec" onclick="verDiaGira(\''+hoy+'\')" style="margin:0">Ver / ejecutar hoy</button></div>';
  document.getElementById('vGB').innerHTML=h;
}
function cambiarSem(d){giraSemOffset+=d;renderVG();}
function moverEnGira(cid,fecha,dir){
  var dd=D.gira.filter(function(g){return g.fecha===fecha;}).sort(function(a,b){return(a.orden||0)-(b.orden||0);});
  var idx=dd.findIndex(function(g){return g.cid===cid;});
  var idx2=idx+dir;if(idx2<0||idx2>=dd.length)return;
  dd.forEach(function(g,i){g.orden=i;});
  var tmp=dd[idx].orden;dd[idx].orden=dd[idx2].orden;dd[idx2].orden=tmp;
  fsSetGira(dd[idx]);
  fsSetGira(dd[idx2]);
  verDiaGira(fecha);
}
function verDiaGira(fecha){
  var planDia=D.gira.filter(function(g){return g.fecha===fecha;}).sort(function(a,b){return(a.orden||0)-(b.orden||0);});
  var hoy=today();var esHoy=fecha===hoy;
  var nomDia=new Date(fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  var h='<div style="font-size:13px;color:var(--muted);margin-bottom:14px;text-transform:capitalize">'+nomDia+(esHoy?' · <span style="color:var(--cyan);font-weight:700">HOY</span>':'')+'</div>';
  var n=planDia.length;
  if(n){
    planDia.forEach(function(g,idx){
      var c=D.cli.find(function(x){return x.id===g.cid;});if(!c)return;
      var yaVis=esHoy&&D.vis.some(function(v){return v.cid===g.cid&&v.fecha===hoy;});
      h+='<div style="display:flex;align-items:center;gap:6px;padding:9px 0;border-bottom:1px solid var(--border)">';
      h+='<div style="display:flex;flex-direction:column;gap:1px;flex-shrink:0">';
      h+='<button style="background:none;border:none;font-size:13px;cursor:pointer;padding:2px 5px;opacity:'+(idx===0?'.2':'1')+'" '+(idx===0?'disabled':'')+' onclick="moverEnGira(\''+g.cid+'\',\''+fecha+'\',-1)">&#9650;</button>';
      h+='<button style="background:none;border:none;font-size:13px;cursor:pointer;padding:2px 5px;opacity:'+(idx===n-1?'.2':'1')+'" '+(idx===n-1?'disabled':'')+' onclick="moverEnGira(\''+g.cid+'\',\''+fecha+'\',1)">&#9660;</button>';
      h+='</div>';
      h+='<div style="width:24px;height:24px;border-radius:50%;background:'+(yaVis?'var(--green)':'var(--s3)')+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0">'+(yaVis?'&#10003;':idx+1)+'</div>';
      h+='<div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+es(c.nm)+'</div>';
      h+='<div style="font-size:11px;color:var(--muted)">'+es(c.ciu||c.bar||'')+(c.tipo?' · '+es(c.tipo):'')+'</div></div>';
      if(esHoy&&!yaVis){h+='<button class="sm g" onclick="cMod();abrirVisita(\''+c.id+'\')">Ir</button>';}
      h+='<button class="sm rd" onclick="quitarDeGira(\''+c.id+'\',\''+fecha+'\');verDiaGira(\''+fecha+'\')">&#215;</button></div>';
    });
  } else {
    h+='<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0">Sin visitas planificadas</div>';
  }
  h+='<button class="btn" onclick="abrirAgregarAGira(\''+fecha+'\')" style="margin-top:14px">+ Agregar contactos</button>';
  oMod('Gira del dia',h);
}

// ── EMBUDO: ordenamiento ──────────────────────────────────────────────
var vEOrd='nm';
function renderVE(){
  var all=['Todos','Nuevo Prospecto','Contactado','Propuesta Enviada','Negociacion','Cliente Activo','No Le Interesa','Perdido'];
  document.getElementById('vEF').innerHTML=
    all.map(function(e){return '<span class="fb'+(vEFil===e?' on':'')+'" onclick="setVEF(\''+es(e)+'\')">'+es(e)+'</span>';}).join('')+
    '<div style="display:flex;gap:4px;margin-left:8px"><span class="fb'+(vEOrd==='nm'?' on':'')+'" onclick="vEOrd=\'nm\';renderVE()" style="font-size:10px">A-Z</span><span class="fb'+(vEOrd==='bar'?' on':'')+'" onclick="vEOrd=\'bar\';renderVE()" style="font-size:10px">Barrio</span><span class="fb'+(vEOrd==='tipo'?' on':'')+'" onclick="vEOrd=\'tipo\';renderVE()" style="font-size:10px">Tipo</span></div>';
  var cs=vEFil==='Todos'?misContactos().slice():misContactos().filter(function(c){
    if(vEFil==='Nuevo Prospecto')return c.esP&&(!c.etapaEmbudo||c.etapaEmbudo==='Nuevo Prospecto');
    return c.etapaEmbudo===vEFil;
  });
  cs.sort(function(a,b){var va=a[vEOrd]||'';var vb=b[vEOrd]||'';return va.localeCompare(vb);});
  if(!cs.length){document.getElementById('vEB').innerHTML='<div class="empty">Sin contactos en esta etapa</div>';return;}
  var h='';
  cs.forEach(function(c){
    var col=EC[c.etapaEmbudo]||'var(--muted)';
    h+='<div class="cc"><div style="display:flex;align-items:center;gap:10px;margin-bottom:9px"><div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:700">'+es(c.nm)+'</div><div style="font-size:12px;color:var(--muted)">'+es(c.bar||'')+(c.tipo?' · '+es(c.tipo):'')+'</div></div>';
    h+='<span style="background:rgba('+h2r(col)+',.15);color:'+col+';padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap">'+es(c.etapaEmbudo||'Prospecto')+'</span></div>';
    h+='<div style="display:flex;gap:6px"><button class="sm g" onclick="abrirVisita(\''+c.id+'\')" style="flex:1">Visita</button>';
    if(c.tel){h+='<button class="sm wa" onclick="envWA(\''+c.id+'\')" title="WA"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>';}
    h+='<select class="sm" onchange="cambiarEtapa(\''+c.id+'\',this.value);this.value=\'\';" style="border-color:'+col+';color:'+col+';max-width:120px">';
    h+='<option value="">Mover etapa</option>';
    ET.concat(SA).forEach(function(et){if(et!==c.etapaEmbudo)h+='<option value="'+es(et)+'">'+es(et)+'</option>';});
    h+='</select></div></div>';
  });
  document.getElementById('vEB').innerHTML=h;
}

// ── CONTACTOS: tarjetas mejoradas con todos los datos ─────────────────
function renderVC(){
  var q=(document.getElementById('vCQ')&&document.getElementById('vCQ').value||'').toLowerCase();
  var cs=D.cli.slice();
  if(vcF.tipo==='prospecto')cs=cs.filter(function(c){return c.esP;});
  else if(vcF.tipo==='cliente')cs=cs.filter(function(c){return !c.esP;});
  if(vcF.bar)cs=cs.filter(function(c){return c.bar===vcF.bar;});
  if(vcF.tipOneg)cs=cs.filter(function(c){return c.tipo===vcF.tipOneg;});
  if(vcF.vis==='v')cs=cs.filter(function(c){return !!c.ul;});
  if(vcF.vis==='sv')cs=cs.filter(function(c){return !c.ul;});
  if(vcF.frez==='sin')cs=cs.filter(function(c){return c.cFr==='Sin freezer'||!c.cFr;});
  if(vcF.frez==='pro')cs=cs.filter(function(c){return c.cFr==='Propio';});
  if(vcF.frez==='comp')cs=cs.filter(function(c){return c.cFr==='Competencia';});
  if(vcF.comp.length)cs=cs.filter(function(c){return vcF.comp.some(function(cp){return c.comp&&c.comp.includes(cp);});});
  if(vcF.calU)cs=cs.filter(function(c){return c.calU===vcF.calU;});
  if(vcF.trans)cs=cs.filter(function(c){return c.trans===vcF.trans;});
  if(vcF.prods.length)cs=cs.filter(function(c){return vcF.prods.some(function(p){return c.prods&&c.prods.indexOf(p)>=0;});});
  if(q)cs=cs.filter(function(c){return (c.nm||'').toLowerCase().includes(q)||(c.dir||'').toLowerCase().includes(q)||(c.bar||'').toLowerCase().includes(q);});
  cs.sort(function(a,b){return(a.nm||'').localeCompare(b.nm||'');});
  var chips='';
  if(vcF.tipo){chips+='<span class="ch on" onclick="qFiltro(\'tipo\')" style="font-size:11px;padding:5px 10px">'+vcF.tipo+' &#215;</span>';}
  if(vcF.bar){chips+='<span class="ch on" onclick="qFiltro(\'bar\')" style="font-size:11px;padding:5px 10px">'+es(vcF.bar)+' &#215;</span>';}
  if(vcF.tipOneg){chips+='<span class="ch on" onclick="qFiltro(\'tipOneg\')" style="font-size:11px;padding:5px 10px">'+es(vcF.tipOneg)+' &#215;</span>';}
  if(vcF.vis){chips+='<span class="ch on" onclick="qFiltro(\'vis\')" style="font-size:11px;padding:5px 10px">'+(vcF.vis==='v'?'Visitados':'Sin visitar')+' &#215;</span>';}
  if(vcF.frez){chips+='<span class="ch on" onclick="qFiltro(\'frez\')" style="font-size:11px;padding:5px 10px">Freezer: '+(vcF.frez==='sin'?'Sin':vcF.frez==='pro'?'Propio':'Competencia')+' &#215;</span>';}
  if(vcF.comp.length){chips+='<span class="ch on" onclick="qFiltro(\'comp\')" style="font-size:11px;padding:5px 10px">Comp: '+es(vcF.comp.join(', '))+' &#215;</span>';}
  if(vcF.calU){chips+='<span class="ch on" onclick="qFiltro(\'calU\')" style="font-size:11px;padding:5px 10px">Ubic: '+vcF.calU+' &#215;</span>';}
  if(vcF.trans){chips+='<span class="ch on" onclick="qFiltro(\'trans\')" style="font-size:11px;padding:5px 10px">Transito: '+vcF.trans+' &#215;</span>';}
  if(vcF.prods.length){chips+='<span class="ch on" onclick="qFiltro(\'prods\')" style="font-size:11px;padding:5px 10px">Vende: '+es(vcF.prods.join(', '))+' &#215;</span>';}
  var actDiv=document.getElementById('vCActivos');
  if(actDiv){actDiv.innerHTML=chips;actDiv.style.display=chips?'block':'none';}
  var h='<div style="padding:6px 14px;font-size:11px;color:var(--muted);font-weight:700">'+cs.length+' CONTACTOS</div>';
  if(!cs.length){h+='<div class="empty">Sin resultados</div>';document.getElementById('vCB').innerHTML=h;return;}
  cs.forEach(function(c){
    var d7=dias(c.ul);
    var colVis=d7===null?'var(--red)':d7>14?'var(--red)':d7>7?'var(--orange)':'var(--green)';
    h+='<div class="cc" onclick="abrirFichaV(\''+c.id+'\')">';
    h+='<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px">';
    h+='<div style="flex:1;min-width:0">';
    h+='<div style="font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+es(c.nm)+'</div>';
    h+=(c.tipo?'<div style="font-size:12px;color:var(--muted)">'+es(c.tipo)+(c.bar?' · '+es(c.bar):'')+'</div>':'');
    h+='<div style="font-size:12px;color:var(--muted)">'+es(c.dir||'')+'</div>';
    h+='</div>';
    h+='<span class="tg '+(c.esP?'o':'g')+'">'+(c.esP?'PROS':'CLI')+'</span></div>';
    // Datos clave
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">';
    h+='<div style="background:var(--s2);border-radius:6px;padding:6px 8px"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">Ultima visita</div><div style="font-size:12px;font-weight:700;color:'+colVis+'">'+fmt(c.ul)+'</div></div>';
    h+='<div style="background:var(--s2);border-radius:6px;padding:6px 8px"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px">Ultimo pedido</div><div style="font-size:12px;font-weight:700;color:var(--green)">'+fmt(c.uv)+'</div></div>';
    h+='</div>';
    h+='<div style="display:flex;gap:6px">';
    h+='<button class="sm g" onclick="event.stopPropagation();abrirVisita(\''+c.id+'\')" style="flex:1">Registrar visita</button>';
    if(c.tel){h+='<button class="sm wa" onclick="event.stopPropagation();envWA(\''+c.id+'\')" title="WhatsApp"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>';}
    h+='</div></div>';
  });
  document.getElementById('vCB').innerHTML=h;
}

// INIT
window.addEventListener('load',function(){
  // PWA: registrar service worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
  document.getElementById('lP').addEventListener('keypress',function(e){if(e.key==='Enter')doLogin();});
  document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)cMod();});

  // Arrancar Firebase: autenticacion anonima (requerida por las reglas de seguridad)
  // y recien despues activar los listeners en tiempo real de cada coleccion
  fsBootMsg('Conectando...');
  firebase.auth().signInAnonymously().then(function(){
    fsBootMsg('Sincronizando datos...');
    fsSetupListeners();
  }).catch(function(err){
    debugLog('error','Auth: '+err.message);
    fsBootMsg('Sin conexion. Reintentando...');
    setTimeout(function(){window.location.reload();},5000);
  });
});
